<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Mode - Species Guessing Game</title>
  <link rel="stylesheet" href="/static/Species guessing game/src/styles.css" />
</head>
<body>
  <div id="mode-select">
    <div class="mode-select-card">
      <p class="eyebrow">Species guessing game</p>
      <h1>Choose your run</h1>
      <p class="mode-intro">Pick a difficulty, then launch a full session mode. Speed Run uses a daily seeded deck so everyone gets the same challenge for the day.</p>

      <div class="difficulty-toggle" id="difficulty-toggle">
        <button class="is-selected" data-difficulty="easy" type="button">
          <span class="mode-title">Easy</span>
          <span class="difficulty-description">Slower blur, clearer animals, gentler guessing.</span>
        </button>
        <button data-difficulty="medium" type="button">
          <span class="mode-title">Medium</span>
          <span class="difficulty-description">Balanced blur speed and standard guess leniency.</span>
        </button>
        <button data-difficulty="hard" type="button">
          <span class="mode-title">Hard</span>
          <span class="difficulty-description">Faster blur, obscure species, and stricter guesses.</span>
        </button>
      </div>

      <div class="mode-buttons">
        <button class="is-selected" data-mode="classic" type="button">
          <span class="mode-title">Classic</span>
          <span class="mode-description">8 rounds, retries allowed, session score at the end.</span>
        </button>
        <button data-mode="suddenDeath" type="button">
          <span class="mode-title">Sudden Death</span>
          <span class="mode-description">5 rounds, one wrong guess can end the session.</span>
        </button>
        <button data-mode="speedRun" type="button">
          <span class="mode-title">Speed Run</span>
          <span class="mode-description">10 rounds, daily seeded deck, fastest total time wins.</span>
        </button>
      </div>

      <p id="previous-best" class="status-message">Loading leaderboard...</p>
      <div class="button-row mode-home-row">
        <button id="home-button" type="button">Home</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY_HIGH_SCORES = "speciesGame_highScores_v2";
    const STORAGE_KEY_LAST_DIFFICULTY = "speciesGame_lastDifficulty_v2";
    const STORAGE_KEY_LAST_MODE = "speciesGame_lastMode_v2";

    const difficultyButtons = Array.from(document.querySelectorAll("[data-difficulty]"));
    const modeButtons = Array.from(document.querySelectorAll("[data-mode]"));
    const previousBestElement = document.getElementById("previous-best");
    const homeButton = document.getElementById("home-button");

    let currentDifficulty = window.localStorage.getItem(STORAGE_KEY_LAST_DIFFICULTY) || "medium";

    function getHighScoreSummary() {
      try {
        const highScores = JSON.parse(window.localStorage.getItem(STORAGE_KEY_HIGH_SCORES) || "{}");
        const entries = Object.values(highScores);
        return entries.length ? Math.max(...entries) : 0;
      } catch (error) {
        return 0;
      }
    }

    function updateDifficultySelection() {
      difficultyButtons.forEach((button) => {
        button.classList.toggle("is-selected", button.dataset.difficulty === currentDifficulty);
      });
      window.localStorage.setItem(STORAGE_KEY_LAST_DIFFICULTY, currentDifficulty);
    }

    function launchMode(mode) {
      window.localStorage.setItem(STORAGE_KEY_LAST_MODE, mode);
      window.location.href = `/Species%20guessing%20game/?mode=${encodeURIComponent(mode)}&difficulty=${encodeURIComponent(currentDifficulty)}`;
    }

    difficultyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        currentDifficulty = button.dataset.difficulty;
        updateDifficultySelection();
      });
    });

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => launchMode(button.dataset.mode));
    });

    previousBestElement.textContent = `Leaderboard best score: ${getHighScoreSummary()}`;
    updateDifficultySelection();

    homeButton.addEventListener("click", () => {
      window.location.href = "/";
    });
  </script>
</body>
</html>
